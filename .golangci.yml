version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly
linters:
  default: standard
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
