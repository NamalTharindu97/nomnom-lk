name: nomnom_lk
description: A Sri Lanka-focused food offers app built with Flutter and mock data.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  dio: ^5.4.0
  flutter_secure_storage: ^9.2.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  firebase_messaging: ^15.2.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_local_notifications: ^19.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^5.0.2
  share_plus: ^7.2.2
  image_picker: ^1.1.0
  url_launcher: ^6.3.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFB23F"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter_native_splash:
  color: "#FFB23F"
  image: assets/app_icon.png
  android_12:
    color: "#FFB23F"
    image: assets/app_icon.png
  ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/samples/
