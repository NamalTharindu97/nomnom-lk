services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nomnom
      POSTGRES_USER: nomnom
      POSTGRES_PASSWORD: nomnom123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomnom"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: namal97/nomnom-backend:latest
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      AWS_S3_ENDPOINT: minio:9000
    restart: unless-stopped

  admin:
    image: namal97/nomnom-admin:latest
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      API_PROXY_TARGET: http://api:8080
      NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
