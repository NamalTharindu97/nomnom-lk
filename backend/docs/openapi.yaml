          type: string
        description:
          type: string
        description_si:
          type: string
        description_ta:
          type: string
        original_price:
          type: number
          exclusiveMinimum: 0
        offer_price:
          type: number
          exclusiveMinimum: 0
        image_urls:
          type: array
          items:
            type: string
            format: uri
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time

    UpdateOfferRequest:
      type: object
      properties:
        title:
          type: string
        title_si:
          type: string
        title_ta:
          type: string
        description:
          type: string
        original_price:
          type: number
        offer_price:
          type: number
        image_urls:
          type: array
          items:
            type: string
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time

