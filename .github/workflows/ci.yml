name: CI

on:
  push:
    branches: [staging, master]
  pull_request:
    branches: [staging, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nomnom
          POSTGRES_PASSWORD: nomnom123
          POSTGRES_DB: nomnom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio
        command: server /data --console-address ":9001"
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "mc ready local"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: backend/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend

      - name: Tidy and verify no diff
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum || (echo "go.mod/go.sum are dirty after tidy" && exit 1)
        working-directory: backend

      - name: Check Go vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: backend

      - name: Run unit tests with coverage
        run: go test ./internal/... -v -count=1 -race -coverprofile=coverage.out -covermode=atomic
        working-directory: backend

      - name: Run integration tests
        run: |
          go test -tags=integration ./internal/handlers/... -v -count=1 -timeout 120s
        working-directory: backend
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: nomnom
          TEST_DB_PASSWORD: nomnom123
          TEST_DB_NAME: nomnom_test
          TEST_REDIS_HOST: localhost
          TEST_MINIO_HOST: localhost
          TEST_MINIO_ACCESS_KEY: minioadmin
          TEST_MINIO_SECRET: minioadmin

      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: backend
          files: coverage.out
          flags: backend

      - name: Upload coverage artifact for SonarCloud
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 1

  admin:
    name: Admin (Next.js + Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nomnom
          POSTGRES_PASSWORD: nomnom123
          POSTGRES_DB: nomnom
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio
        command: server /data --console-address ":9001"
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            admin/node_modules
          key: npm-${{ hashFiles('admin/package-lock.json') }}
          restore-keys: npm-

      - name: Install dependencies
        run: npm install
        working-directory: admin

      - name: Lint
        run: npm run lint
        working-directory: admin

      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: admin

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: admin

      - name: Run unit tests with coverage
        run: npx vitest run --coverage
        working-directory: admin

      - name: Build
        run: npm run build
        working-directory: admin
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: backend/go.sum

      - name: Debug Postgres connection
        run: |
          echo "Checking Postgres TCP connectivity..."
          if command -v nc &>/dev/null; then
            nc -zv localhost 5432 || echo "nc: port 5432 connection failed"
          fi
          if command -v ss &>/dev/null; then
            ss -tln | grep 5432 || echo "ss: no listener on 5432"
          fi
          echo "Done checking"

      - name: Go mod tidy
        working-directory: backend
        run: go mod tidy

      - name: Check database connectivity
        working-directory: backend
        run: go run ./scripts/dbcheck.go

      - name: Run migration
        run: go run -tags=migration ./scripts/migrate.go up
        working-directory: backend
        env:
          ENVIRONMENT: test
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_USER: nomnom
          DATABASE_PASSWORD: nomnom123
          DATABASE_NAME: nomnom
          DATABASE_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_SECRET: test-secret-key-for-ci
          R2_ACCESS_KEY_ID: minioadmin
          R2_SECRET_ACCESS_KEY: minioadmin
          R2_BUCKET: nomnom-images
          R2_ENDPOINT: localhost:9000
          R2_FORCE_PATH_STYLE: "true"
          ADMIN_EMAIL: admin@nomnom.lk
          ADMIN_PASSWORD: Admin@123

      - name: Run seed
        run: go run -tags=seed ./scripts/seed.go
        working-directory: backend
        env:
          ENVIRONMENT: test
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_USER: nomnom
          DATABASE_PASSWORD: nomnom123
          DATABASE_NAME: nomnom
          DATABASE_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_SECRET: test-secret-key-for-ci
          R2_ACCESS_KEY_ID: minioadmin
          R2_SECRET_ACCESS_KEY: minioadmin
          R2_BUCKET: nomnom-images
          R2_ENDPOINT: localhost:9000
          R2_FORCE_PATH_STYLE: "true"
          ADMIN_EMAIL: admin@nomnom.lk
          ADMIN_PASSWORD: Admin@123

      - name: Start backend
        run: |
          go build -o /tmp/server ./cmd/server/main.go
          echo "Compilation done, starting server..."
          /tmp/server > /tmp/backend.log 2>&1 &
          SERVER_PID=$!
          for i in {1..6}; do
            sleep 2
            if curl -sS http://localhost:8080/health 2>/dev/null; then
              echo "Backend running (PID: $SERVER_PID)"
              exit 0
            fi
          done
          echo "=== Backend failed to start ==="
          kill $SERVER_PID 2>/dev/null
          wait $SERVER_PID 2>/dev/null
          cat /tmp/backend.log
        working-directory: backend
        env:
          ENVIRONMENT: test
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_USER: nomnom
          DATABASE_PASSWORD: nomnom123
          DATABASE_NAME: nomnom
          DATABASE_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_SECRET: test-secret-key-for-ci
          R2_ACCESS_KEY_ID: minioadmin
          R2_SECRET_ACCESS_KEY: minioadmin
          R2_BUCKET: nomnom-images
          R2_ENDPOINT: localhost:9000
          R2_FORCE_PATH_STYLE: "true"
          SERVER_PORT: "8080"
          CORS_ORIGINS: "*"
          ADMIN_EMAIL: admin@nomnom.lk
          ADMIN_PASSWORD: Admin@123

      - name: Start admin
        run: |
          npm run start > /tmp/admin.log 2>&1 &
          ADMIN_PID=$!
          for i in {1..15}; do
            sleep 2
            if curl -sS -o /dev/null http://localhost:3000/login 2>/dev/null; then
              echo "Admin running (PID: $ADMIN_PID)"
              exit 0
            fi
          done
          echo "Admin failed to start"
          cat /tmp/admin.log
          kill $ADMIN_PID 2>/dev/null
          exit 1
        working-directory: admin

      - name: Upload admin log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: admin-log
          path: /tmp/admin.log
          retention-days: 3

      - name: Install Playwright
        run: npx playwright install chromium
        working-directory: admin

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: admin
        env:
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: admin/playwright-report/
          retention-days: 3

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: admin/test-results/
          retention-days: 3

      - name: Upload admin coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          directory: admin
          files: coverage/lcov.info
          flags: admin

      - name: Upload coverage artifact for SonarCloud
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-coverage
          path: admin/coverage/lcov.info
          retention-days: 1

  flutter:
    name: Flutter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.7"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

  docker:
    name: Docker (Build + Push + Scan)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [backend, admin, flutter]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: meta
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nomnom-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/nomnom-backend:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/nomnom-backend:latest
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Build & Push Admin
        uses: docker/build-push-action@v5
        with:
          context: admin
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            API_PROXY_TARGET=https://nomnom-backend-7iq0.onrender.com
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nomnom-admin:latest
            ${{ secrets.DOCKER_USERNAME }}/nomnom-admin:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan admin image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/nomnom-admin:latest
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [backend, admin]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: backend-coverage
          path: backend/

      - name: Download admin coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: admin-coverage
          path: admin/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
