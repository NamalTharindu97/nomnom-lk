name: Test

on:
  push:
    branches: [master, "phase/**"]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nomnom
          POSTGRES_PASSWORD: nomnom123
          POSTGRES_DB: nomnom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio
        command: server /data --console-address ":9001"
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "mc ready local"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: go mod tidy
        working-directory: backend

      - name: Run unit tests
        run: go test ./internal/... -v -count=1 -race
        working-directory: backend

      - name: Run integration tests
        run: |
          go test -tags=integration ./internal/handlers/... -v -count=1 -timeout 120s
        working-directory: backend
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: nomnom
          TEST_DB_PASSWORD: nomnom123
          TEST_DB_NAME: nomnom_test
          TEST_REDIS_HOST: localhost
          TEST_MINIO_HOST: localhost
          TEST_MINIO_ACCESS_KEY: minioadmin
          TEST_MINIO_SECRET: minioadmin

  admin:
    name: Admin (Next.js + Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nomnom
          POSTGRES_PASSWORD: nomnom123
          POSTGRES_DB: nomnom
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio
        command: server /data --console-address ":9001"
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install
        working-directory: admin

      - name: Build
        run: npm run build
        working-directory: admin
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Debug Postgres connection
        run: |
          echo "Checking Postgres TCP connectivity..."
          if command -v nc &>/dev/null; then
            nc -zv localhost 5432 || echo "nc: port 5432 connection failed"
          fi
          if command -v ss &>/dev/null; then
            ss -tln | grep 5432 || echo "ss: no listener on 5432"
          fi
          echo "Done checking"

      - name: Run migration
        run: |
          LOGFILE=$(mktemp)
          go run ./scripts/dbcheck.go > "$LOGFILE" 2>&1; EXIT_CODE=$?
          cat "$LOGFILE"
          if [ "$EXIT_CODE" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi
          echo "=== Running migration ==="
          go run -tags=migration ./scripts/migrate.go up
        working-directory: backend
        env:
          ENVIRONMENT: test
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_USER: nomnom
          DATABASE_PASSWORD: nomnom123
          DATABASE_NAME: nomnom
          DATABASE_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_SECRET: test-secret-key-for-ci
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_S3_BUCKET: nomnom-images
          AWS_S3_ENDPOINT: localhost:9000
          AWS_S3_FORCE_PATH_STYLE: "true"
          ADMIN_EMAIL: admin@nomnom.lk
          ADMIN_PASSWORD: Admin@123

      - name: Run seed
        run: go run -tags=seed ./scripts/seed.go
        working-directory: backend
        env:
          ENVIRONMENT: test
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_USER: nomnom
          DATABASE_PASSWORD: nomnom123
          DATABASE_NAME: nomnom
          DATABASE_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_SECRET: test-secret-key-for-ci
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_S3_BUCKET: nomnom-images
          AWS_S3_ENDPOINT: localhost:9000
          AWS_S3_FORCE_PATH_STYLE: "true"
          ADMIN_EMAIL: admin@nomnom.lk
          ADMIN_PASSWORD: Admin@123

      - name: Start backend
        run: |
          go build -o /tmp/server ./cmd/server/main.go
          echo "Compilation done, starting server..."
          /tmp/server > /tmp/backend.log 2>&1 &
          for i in {1..6}; do
            sleep 2
            if curl -sS http://localhost:8080/health 2>/dev/null; then
              echo "Backend running (PID: $(jobs -p))"
              exit 0
            fi
            echo "Waiting for backend... attempt $i"
          done
          echo "=== Backend failed to start ==="
          cat /tmp/backend.log
          exit 1
        working-directory: backend
        env:
          ENVIRONMENT: test
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_USER: nomnom
          DATABASE_PASSWORD: nomnom123
          DATABASE_NAME: nomnom
          DATABASE_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_SECRET: test-secret-key-for-ci
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_S3_BUCKET: nomnom-images
          AWS_S3_ENDPOINT: localhost:9000
          AWS_S3_FORCE_PATH_STYLE: "true"
          SERVER_PORT: "8080"
          CORS_ORIGINS: "*"
          ADMIN_EMAIL: admin@nomnom.lk
          ADMIN_PASSWORD: Admin@123

      - name: Install Playwright
        run: npx playwright install chromium
        working-directory: admin

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: admin
        env:
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1

  flutter:
    name: Flutter Unit + Widget Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run unit and widget tests
        run: flutter test
