name: Deploy VPS Secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected GitHub environment to deploy
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: deploy-vps-secrets-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Install secrets and verify services
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Check out reviewed deployment scripts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install SSH identity
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail
          umask 077
          install -d "$RUNNER_TEMP/nomnom-ssh"
          printf '%s' "$VPS_SSH_PRIVATE_KEY" > "$RUNNER_TEMP/nomnom-ssh/id"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$RUNNER_TEMP/nomnom-ssh/known_hosts"
          chmod 0600 "$RUNNER_TEMP/nomnom-ssh/id" "$RUNNER_TEMP/nomnom-ssh/known_hosts"

      - name: Stream secrets to fixed server installer
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_DEPLOY_USER: ${{ vars.VPS_DEPLOY_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          ADMIN_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          POSTGRES_TLS_CERT: ${{ secrets.POSTGRES_TLS_CERT }}
          POSTGRES_TLS_KEY: ${{ secrets.POSTGRES_TLS_KEY }}
          BACKUP_R2_ACCESS_KEY: ${{ secrets.BACKUP_R2_ACCESS_KEY }}
          BACKUP_R2_SECRET_KEY: ${{ secrets.BACKUP_R2_SECRET_KEY }}
          AGE_RECIPIENT: ${{ vars.AGE_RECIPIENT }}
        run: |
          set -Eeuo pipefail
          trap 'rm -rf "$RUNNER_TEMP/nomnom-ssh"' EXIT
          : "${VPS_HOST:?VPS_HOST is required}"
          : "${VPS_DEPLOY_USER:?VPS_DEPLOY_USER is required}"
          port=${VPS_PORT:-22}
          ssh_options=(
            -i "$RUNNER_TEMP/nomnom-ssh/id"
            -p "$port"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o "UserKnownHostsFile=$RUNNER_TEMP/nomnom-ssh/known_hosts"
          )
          scripts/vps/package-secrets.sh | ssh "${ssh_options[@]}" \
            "$VPS_DEPLOY_USER@$VPS_HOST" \
            "sudo /usr/local/sbin/nomnom-install-secrets"
          ssh "${ssh_options[@]}" "$VPS_DEPLOY_USER@$VPS_HOST" \
            "sudo /usr/local/sbin/nomnom-deploy"
