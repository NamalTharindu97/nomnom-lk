# NomNom LK — Render Blueprint (Backend Only)
# Deploy: Render Dashboard → New → Blueprint → Connect repo

services:
  # ── Go Backend API ──────────────────────────────────────────────
  - type: web
    name: nomnom-backend
    runtime: image
    plan: free
    region: singapore
    image:
      url: docker.io/namal97/nomnom-backend:latest
    healthCheckPath: /health
    envVars:
      - key: SERVER_PORT
        value: "10000"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nomnom-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nomnom-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_BUCKET
        value: nomnom-images
      - key: R2_ENDPOINT
        sync: false
      - key: R2_SECURE
        value: "true"
      - key: R2_FORCE_PATH_STYLE
        value: "false"
      - key: R2_PREFIX
        value: production
      - key: CORS_ORIGINS
        value: "https://nomnom-admin.onrender.com"
      - key: ADMIN_EMAIL
        value: admin@nomnom.lk
      - key: ADMIN_PASSWORD
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        value: /etc/secrets/firebase-credentials.json

  # ── Render Redis KV ────────────────────────────────────────────
  - type: keyvalue
    name: nomnom-redis
    plan: free
    region: singapore
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all (private network only)

databases:
  # ── Render PostgreSQL ──────────────────────────────────────────
  - name: nomnom-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    databaseName: nomnom
    user: nomnom
    ipAllowList: []
