# NomNom LK — Render Blueprint (Free Plan)
# Deploy: Render Dashboard → New → Blueprint → Connect repo

services:
  # ── Go Backend API ──────────────────────────────────────────────
  - type: web
    name: nomnom-backend
    runtime: image
    plan: free
    region: oregon
    image:
      url: docker.io/namal97/nomnom-backend:latest
    healthCheckPath: /health
    envVars:
      - key: SERVER_PORT
        value: "10000"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nomnom-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nomnom-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_BUCKET
        value: nomnom-images
      - key: R2_ENDPOINT
        sync: false
      - key: R2_FORCE_PATH_STYLE
        value: "true"
      - key: CORS_ORIGINS
        fromService:
          name: nomnom-admin
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: ADMIN_EMAIL
        value: admin@nomnom.lk
      - key: ADMIN_PASSWORD
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        value: /etc/secrets/firebase-credentials.json

  # ── Next.js Admin Dashboard ────────────────────────────────────
  - type: web
    name: nomnom-admin
    runtime: image
    plan: free
    region: oregon
    image:
      url: docker.io/namal97/nomnom-admin:latest
    healthCheckPath: /login
    envVars:
      - key: API_PROXY_TARGET
        fromService:
          name: nomnom-backend
          type: web
          property: hostport
      - key: NEXT_PUBLIC_API_URL
        value: /api/v1

  # ── Render Redis KV ────────────────────────────────────────────
  - type: keyvalue
    name: nomnom-redis
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all (private network only)

databases:
  # ── Render PostgreSQL ──────────────────────────────────────────
  - name: nomnom-db
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all (private network only)
